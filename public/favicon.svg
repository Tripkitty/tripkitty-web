<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="28" y1="18" x2="164" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F223B"/>
      <stop offset="1" stop-color="#18304D"/>
    </linearGradient>
    <linearGradient id="gold" x1="48" y1="42" x2="144" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E5A33A"/>
      <stop offset="1" stop-color="#C9811E"/>
    </linearGradient>
    <linearGradient id="cream" x1="42" y1="30" x2="150" y2="162" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4DE"/>
      <stop offset="1" stop-color="#F4E4C4"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#cream)" stroke-width="11"/>

  <!-- people -->
  <circle cx="72" cy="58" r="13" fill="url(#gold)" stroke="url(#cream)" stroke-width="7"/>
  <path d="M47 115C43 88 53 73 72 73C91 73 101 88 97 115"
        fill="url(#gold)" stroke="url(#cream)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="120" cy="58" r="13" fill="#10243D" stroke="url(#cream)" stroke-width="7"/>
  <path d="M95 115C91 88 101 73 120 73C139 73 149 88 145 115"
        fill="#10243D" stroke="url(#cream)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- shared bill / purse -->
  <path d="M42 118C56 104 75 94 96 94C117 94 136 104 150 118
           C145 148 124 161 96 161C68 161 47 148 42 118Z"
        fill="url(#gold)" stroke="url(#cream)" stroke-width="7" stroke-linejoin="round"/>

  <path d="M43 119L96 94L149 119" fill="none" stroke="url(#cream)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ruble -->
  <text x="96" y="136"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="45"
        font-weight="700"
        fill="#FFF4DE">₽</text>

  <!-- receipt ticks -->
  <path d="M58 130L63 137" stroke="#FFF4DE" stroke-width="6" stroke-linecap="round"/>
  <path d="M74 145L82 150" stroke="#FFF4DE" stroke-width="6" stroke-linecap="round"/>
  <path d="M108 153L119 151" stroke="#FFF4DE" stroke-width="6" stroke-linecap="round"/>
  <path d="M130 145L138 138" stroke="#FFF4DE" stroke-width="6" stroke-linecap="round"/>
</svg>
